name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK (Docker oficial Buildozer)
        run: |
          docker run --privileged \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            kivy/buildozer \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: bin/*.apk
