<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:system-ui,sans-serif; }
body { background:#1a1a2e; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.phone { width:360px; height:700px; background:#fff; border-radius:30px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.5); display:flex; flex-direction:column; }
.tabs { display:flex; background:#f5f5f5; border-bottom:1px solid #ddd; }
.tab { flex:1; text-align:center; padding:12px 0; font-weight:bold; cursor:pointer; }
.tab.active { color:#2ecc71; border-bottom:3px solid #2ecc71; }
.content { flex:1; display:flex; flex-direction:column; }
.bar { display:flex; justify-content:space-between; padding:10px 12px; align-items:center; }
.bar span { font-weight:bold; font-size:14px; }
.bar button { background:#4444aa; color:#fff; border:none; border-radius:4px; padding:4px 10px; font-size:11px; }
.list { flex:1; overflow-y:auto; padding:0 8px; }
.item { display:flex; align-items:center; padding:8px 4px; border-bottom:1px solid #eee; gap:6px; }
.item .cb { width:20px; height:20px; border:2px solid #2ecc71; border-radius:3px; flex-shrink:0; }
.item .cb.done { background:#2ecc71; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; }
.item .text { flex:1; font-size:13px; }
.item .text.done { color:#999; }
.item .date { font-size:11px; color:#999; width:60px; text-align:right; }
.item .del { color:red; font-weight:bold; cursor:pointer; width:20px; text-align:center; font-size:14px; }
.add { background:#2ecc71; color:#fff; text-align:center; padding:14px; font-weight:bold; font-size:14px; margin:8px; border-radius:6px; }
.colors { display:flex; gap:6px; padding:8px 12px; }
.dot { width:12px; height:12px; border-radius:50%; }
.gasto-item { display:flex; align-items:center; padding:8px 4px; border-bottom:1px solid #eee; gap:6px; font-size:13px; }
.gasto-item .cat { width:60px; font-weight:bold; font-size:11px; }
.gasto-item .con { flex:1; }
.gasto-item .fec { width:55px; font-size:11px; color:#999; text-align:right; }
.gasto-item .imp { width:55px; text-align:right; font-weight:bold; }
.total { text-align:right; padding:8px 12px; font-weight:bold; font-size:15px; }
</style></head><body>
<div class="phone">
<div class="tabs">
<div class="tab active">Tareas</div>
<div class="tab">Gastos</div>
</div>
<div class="content">
<div class="bar"><span>3 pendientes</span><button>Solo pendientes</button></div>
<div class="list">
<div class="item"><div class="cb"></div><div class="text">Comprar material canaleta</div><div class="date">01/07</div><div class="del">✕</div></div>
<div class="item"><div class="cb"></div><div class="text">Llamar cliente Barakaldo</div><div class="date">30/06</div><div class="del">✕</div></div>
<div class="item"><div class="cb done">✓</div><div class="text done">Enviar presupuesto</div><div class="date">28/06</div><div class="del">✕</div></div>
<div class="item"><div class="cb"></div><div class="text">Revisar F/ERS 49</div><div class="date">28/06</div><div class="del">✕</div></div>
</div>
<div class="add">+ AÑADIR TAREA</div>
</div>
</div>
<br>
<div style="width:360px;color:#888;text-align:center;font-size:12px;padding:10px">
(Vista previa simulada - el diseño real dependerá de Kivy en Android)
</div>
</body></html>
